
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --nb:#191919;
    --ns:#202020;
    --nc:#252525;
    --nborder:#2f2f2f;
    --sl-purple:#7c5cbf;
    --sl-purplelite:#a07de8;
    --sl-gold:#d4a843;
    --sl-goldlite:#f0c96e;
    --sl-text:#c8c8e8;
    --sl-muted:#6a6a8a;
    --sl-dim:#3a3a5a;
  }
  body,#app{background:var(--nb);color:var(--sl-text);font-family:'Rajdhani','Segoe UI',sans-serif;font-size:14px}
  #app{padding:16px;max-width:700px;margin:0 auto}
  .sys-header{border:1px solid var(--nborder);border-top:2px solid var(--sl-purple);background:var(--ns);border-radius:4px;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
  .sys-title{font-size:11px;letter-spacing:3px;color:var(--sl-purplelite);text-transform:uppercase;font-weight:600}
  .player-panel{background:var(--ns);border:1px solid var(--nborder);border-radius:4px;padding:12px 14px;margin-bottom:10px;display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:center}
  .rank-badge{width:52px;height:52px;border:2px solid var(--sl-purple);border-radius:4px;display:flex;align-items:center;justify-content:center;flex-direction:column;background:#1a0d2e}
  .rank-letter{font-size:20px;font-weight:700;line-height:1;color:var(--sl-purplelite)}
  .rank-lbl{font-size:9px;color:var(--sl-muted);letter-spacing:1px;text-transform:uppercase}
  .pname{font-size:16px;font-weight:700;color:#e8e8ff;letter-spacing:1px}
  .pclass{font-size:11px;color:var(--sl-purplelite);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
  .xp-row{display:flex;align-items:center;gap:8px;margin-bottom:3px}
  .xp-bg{flex:1;height:5px;background:#1a1a2e;border-radius:2px;border:1px solid var(--nborder);overflow:hidden}
  .xp-fill{height:100%;border-radius:2px;transition:width .6s ease}
  .xp-txt{font-size:11px;color:var(--sl-muted);white-space:nowrap;min-width:80px;text-align:right}
  .stats-row{display:flex;gap:14px}
  .sitem{font-size:11px;color:var(--sl-muted)}
  .sitem span{color:var(--sl-gold);font-weight:600}
  .rank-track{display:flex;gap:3px;margin-bottom:10px}
  .rstep{flex:1;text-align:center}
  .rbar{height:3px;background:var(--nborder);border-radius:1px}
  .rbar-fill{height:100%;border-radius:1px;transition:width .5s}
  .rlbl{font-size:9px;color:var(--sl-dim);letter-spacing:1px;margin-top:2px;text-transform:uppercase}
  .cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .month-title{font-size:15px;font-weight:700;color:#e8e8ff;letter-spacing:2px;text-transform:uppercase}
  .nav-btn{background:var(--ns);border:1px solid var(--nborder);color:var(--sl-muted);padding:4px 10px;border-radius:3px;cursor:pointer;font-family:inherit;font-size:13px;transition:all .15s}
  .nav-btn:hover{border-color:var(--sl-purple);color:var(--sl-purplelite)}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:10px}
  .dlbl{text-align:center;font-size:10px;color:var(--sl-dim);letter-spacing:1px;text-transform:uppercase;padding:3px 0;font-weight:600}
  .dcell{background:var(--ns);border:1px solid var(--nborder);border-radius:3px;padding:5px 3px;min-height:44px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center}
  .dcell:hover{border-color:var(--sl-purple)}
  .dcell.empty{background:transparent;border-color:transparent;cursor:default}
  .dcell.today{border-color:var(--sl-purple);background:#14102a}
  .dcell.selected{border-color:var(--sl-purplelite);background:#0e0e1e}
  .dnum{font-size:13px;font-weight:600;color:var(--sl-muted)}
  .dcell.today .dnum{color:var(--sl-purplelite)}
  .dcell.selected .dnum{color:var(--sl-purplelite)}
  .dxpbg{width:80%;height:2px;background:#1a1a2e;border-radius:1px;margin-top:3px;overflow:hidden}
  .dxpfill{height:100%;border-radius:1px}
  .ddot{width:5px;height:5px;border-radius:50%;margin-top:2px;display:none}

  .modal-wrap{display:none;position:relative;z-index:50;margin-top:8px}
  .modal-wrap.open{display:block}
  .modal-box{background:var(--nc);border:1px solid var(--sl-purple);border-top:2px solid var(--sl-purplelite);border-radius:6px;overflow:hidden}
  .modal-hdr{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--nborder)}
  .modal-title{font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--sl-goldlite)}
  .modal-close{background:none;border:none;color:var(--sl-muted);font-size:18px;cursor:pointer;padding:0 4px;line-height:1;font-family:inherit}
  .modal-close:hover{color:var(--sl-purplelite)}
  .qlist{padding:6px}
  .qitem{display:flex;align-items:center;gap:10px;padding:7px 9px;border-radius:3px;margin-bottom:3px;border:1px solid transparent;cursor:pointer;transition:all .15s}
  .qitem:hover{background:#1a1a2e;border-color:var(--nborder)}
  .qitem.done{opacity:.6}
  .qcheck{width:17px;height:17px;border:1px solid var(--nborder);border-radius:2px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;transition:all .15s}
  .qitem.done .qcheck{background:var(--sl-purple);border-color:var(--sl-purple);color:#fff}
  .qinfo{flex:1}
  .qname{font-size:13px;font-weight:600;color:var(--sl-text);transition:all .15s}
  .qitem.done .qname{text-decoration:line-through;color:var(--sl-muted)}
  .qsub{font-size:11px;color:var(--sl-dim);margin-top:1px}
  .qxp{font-size:11px;font-weight:700;color:var(--sl-purplelite);white-space:nowrap}
  .qitem.done .qxp{color:var(--sl-dim)}
  .modal-footer{padding:8px 14px;border-top:1px solid var(--nborder);display:flex;align-items:center;gap:10px}
  .fp-lbl{font-size:11px;color:var(--sl-muted);text-transform:uppercase;letter-spacing:1px;white-space:nowrap}
  .fp-bg{flex:1;height:7px;background:#1a1a2e;border-radius:2px;border:1px solid var(--nborder);overflow:hidden}
  .fp-fill{height:100%;border-radius:2px;background:var(--sl-purple);transition:width .4s}
  .fp-count{font-size:11px;color:var(--sl-gold);font-weight:700;white-space:nowrap;min-width:38px;text-align:right}

  .notif{background:#1a0d2e;border:1px solid var(--sl-purple);border-left:3px solid var(--sl-purplelite);border-radius:4px;padding:8px 12px;margin-top:8px;opacity:0;transition:opacity .3s;pointer-events:none;max-width:300px}
  .notif.show{opacity:1}
  .ntitle{font-size:11px;color:var(--sl-purplelite);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
  .nbody{font-size:13px;color:var(--sl-text)}

  .lvlup{display:none;border:1px solid var(--sl-purple);border-top:2px solid var(--sl-purplelite);background:var(--nc);padding:24px;border-radius:6px;text-align:center;margin-top:8px}
  .lvlup.show{display:block}
  .lvalert{font-size:11px;letter-spacing:3px;color:var(--sl-purplelite);text-transform:uppercase;margin-bottom:6px}
  .lvltext{font-size:28px;font-weight:700;color:#fff;letter-spacing:2px}
  .lvlsub{font-size:13px;color:var(--sl-gold);margin-top:4px}
  .dis-btn{margin-top:12px;background:var(--sl-purple);color:#fff;border:none;padding:7px 20px;border-radius:3px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
</style>

<h2 class="sr-only">Solo Leveling gamified quest calendar for Notion dark mode</h2>
<div id="app">
  <div class="sys-header">
    <div class="sys-title">◆ System Interface — Daily Quest Terminal</div>
    <div style="font-size:11px;color:var(--sl-dim);letter-spacing:1px;">NOTION SYNC: ACTIVE</div>
  </div>
  <div class="player-panel" id="playerPanel"></div>
  <div class="rank-track" id="rankTrack"></div>
  <div class="cal-header">
    <button class="nav-btn" id="prevBtn">&#8249; PREV</button>
    <div class="month-title" id="monthTitle"></div>
    <button class="nav-btn" id="nextBtn">NEXT &#8250;</button>
  </div>
  <div class="cal-grid" id="calGrid"></div>
  <div class="modal-wrap" id="modalWrap">
    <div class="modal-box" id="modalBox"></div>
  </div>
  <div id="notifSlot"></div>
  <div class="lvlup" id="lvlup">
    <div class="lvalert">◆ System Alert ◆</div>
    <div class="lvltext" id="lvlupText"></div>
    <div class="lvlsub" id="lvlupSub"></div>
    <button class="dis-btn" onclick="dismissLvl()">Acknowledge</button>
  </div>
</div>

<script>
const RANKS=['E','D','C','B','A','S','SS','SSS','National'];
const RCOLS=['#888','#27ae60','#3a7bd5','#a07de8','#d4a843','#c0392b','#e74c3c','#9b59b6','#f39c12'];
const RTHRESH=[0,200,500,1000,2000,3500,5500,8000,12000];
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const SMONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

const QUESTS=[
  {id:'morning',name:'Morning Ritual',sub:'Wake up + hydrate + stretch',xp:25},
  {id:'workout',name:'Physical Training',sub:'30 min exercise',xp:50},
  {id:'focus',name:'Deep Focus Session',sub:'90 min uninterrupted work',xp:60},
  {id:'read',name:'Knowledge Absorption',sub:'Read 20+ pages',xp:30},
  {id:'reflect',name:'Hunter\'s Journal',sub:'Log progress & reflections',xp:20},
  {id:'mission',name:'Main Mission',sub:'Complete top priority task',xp:70},
  {id:'rest',name:'Recovery Protocol',sub:'7–8 hrs sleep',xp:25},
];
const TOTAL_XP=QUESTS.reduce((s,q)=>s+q.xp,0);

let S={month:new Date().getMonth(),year:new Date().getFullYear(),selDay:new Date().getDate(),totalXP:420,level:7,completions:{}};
try{const sv=localStorage.getItem('sl2_state');if(sv)Object.assign(S,JSON.parse(sv));}catch(e){}
function save(){try{localStorage.setItem('sl2_state',JSON.stringify(S));}catch(e){}}

function getRank(xp){let r=0;for(let i=RTHRESH.length-1;i>=0;i--){if(xp>=RTHRESH[i]){r=i;break;}}return r;}
function getXPInfo(xp){const ri=getRank(xp);if(ri>=RTHRESH.length-1)return{pct:100,curr:xp,next:xp};const lo=RTHRESH[ri],hi=RTHRESH[ri+1];return{pct:Math.round((xp-lo)/(hi-lo)*100),curr:xp-lo,next:hi-lo};}
function dayKey(y,m,d){return `${y}-${m}-${d}`;}
function getDayDone(y,m,d){return S.completions[dayKey(y,m,d)]||{};}
function getDayPct(y,m,d){const done=getDayDone(y,m,d);const earned=QUESTS.filter(q=>done[q.id]).reduce((s,q)=>s+q.xp,0);return earned/TOTAL_XP;}

function renderPlayer(){
  const ri=getRank(S.totalXP),info=getXPInfo(S.totalXP);
  document.getElementById('playerPanel').innerHTML=`
    <div class="rank-badge"><div class="rank-letter" style="color:${RCOLS[ri]}">${RANKS[ri]}</div><div class="rank-lbl">Rank</div></div>
    <div>
      <div class="pname">SUNG JIN-WOO</div>
      <div class="pclass">Shadow Monarch Hunter</div>
      <div class="xp-row"><div class="xp-bg"><div class="xp-fill" style="width:${info.pct}%;background:${RCOLS[ri]}"></div></div><div class="xp-txt">${info.curr} / ${info.next} XP</div></div>
      <div class="stats-row"><div class="sitem">Level <span>${S.level}</span></div><div class="sitem">Total XP <span>${S.totalXP}</span></div><div class="sitem">Rank <span style="color:${RCOLS[ri]}">${RANKS[ri]}</span></div></div>
    </div>`;
}

function renderRankTrack(){
  const ri=getRank(S.totalXP);
  document.getElementById('rankTrack').innerHTML=RANKS.map((r,i)=>{
    const active=i<=ri,col=active?RCOLS[i]:'#2a2a3a';
    return `<div class="rstep"><div class="rbar"><div class="rbar-fill" style="width:${active?100:0}%;background:${col}"></div></div><div class="rlbl" style="color:${active?col:'var(--sl-dim)'}">${r}</div></div>`;
  }).join('');
}

function renderCalendar(){
  const {month,year,selDay}=S;
  const today=new Date();
  const firstDay=new Date(year,month,1).getDay();
  const days=new Date(year,month+1,0).getDate();
  document.getElementById('monthTitle').textContent=`${MONTHS[month]} ${year}`;
  const DLBLS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let html=DLBLS.map(d=>`<div class="dlbl">${d}</div>`).join('');
  for(let i=0;i<firstDay;i++) html+=`<div class="dcell empty"></div>`;
  for(let d=1;d<=days;d++){
    const isToday=d===today.getDate()&&month===today.getMonth()&&year===today.getFullYear();
    const isSel=d===selDay;
    const pct=getDayPct(year,month,d);
    const fillCol=pct>=1?'var(--sl-gold)':pct>0?'var(--sl-purplelite)':'var(--nborder)';
    let cls='dcell';
    if(isToday)cls+=' today';
    if(isSel)cls+=' selected';
    html+=`<div class="${cls}" onclick="selectDay(${d})">
      <div class="dnum">${d}</div>
      <div class="dxpbg"><div class="dxpfill" style="width:${Math.round(pct*100)}%;background:${fillCol}"></div></div>
      ${pct>=1?`<div class="ddot" style="display:block;background:var(--sl-gold)"></div>`:''}
    </div>`;
  }
  document.getElementById('calGrid').innerHTML=html;
}

let notifTimer;
function showNotif(title,body){
  const slot=document.getElementById('notifSlot');
  slot.innerHTML=`<div class="notif" id="notif"><div class="ntitle">${title}</div><div class="nbody">${body}</div></div>`;
  requestAnimationFrame(()=>{const n=document.getElementById('notif');if(n)n.classList.add('show');});
  clearTimeout(notifTimer);
  notifTimer=setTimeout(()=>{const n=document.getElementById('notif');if(n)n.classList.remove('show');},2800);
}

function showModal(d){
  const {month,year}=S;
  const done=getDayDone(year,month,d);
  const earned=QUESTS.filter(q=>done[q.id]).reduce((s,q)=>s+q.xp,0);
  const pct=Math.round(earned/TOTAL_XP*100);
  const qhtml=QUESTS.map(q=>{
    const isDone=!!done[q.id];
    return `<div class="qitem ${isDone?'done':''}" onclick="toggleQuest(${d},'${q.id}')">
      <div class="qcheck">${isDone?'✓':''}</div>
      <div class="qinfo"><div class="qname">${q.name}</div><div class="qsub">${q.sub}</div></div>
      <div class="qxp">+${q.xp} XP</div>
    </div>`;
  }).join('');
  document.getElementById('modalBox').innerHTML=`
    <div class="modal-hdr">
      <div class="modal-title">◆ Daily Quests — ${SMONTHS[month]} ${d}, ${year}</div>
      <button class="modal-close" onclick="closeModal()" aria-label="Close">×</button>
    </div>
    <div class="qlist">${qhtml}</div>
    <div class="modal-footer">
      <div class="fp-lbl">Daily XP</div>
      <div class="fp-bg"><div class="fp-fill" style="width:${pct}%"></div></div>
      <div class="fp-count">${earned}/${TOTAL_XP}</div>
    </div>`;
  document.getElementById('modalWrap').classList.add('open');
}

function closeModal(){document.getElementById('modalWrap').classList.remove('open');}

function selectDay(d){
  const wasOpen=document.getElementById('modalWrap').classList.contains('open');
  if(S.selDay===d&&wasOpen){closeModal();return;}
  S.selDay=d;
  renderCalendar();
  showModal(d);
}

function toggleQuest(d,qid){
  const {month,year}=S;
  const key=dayKey(year,month,d);
  if(!S.completions[key])S.completions[key]={};
  const done=S.completions[key];
  const q=QUESTS.find(q=>q.id===qid);
  const rankBefore=getRank(S.totalXP);
  if(done[qid]){
    done[qid]=false;
    S.totalXP=Math.max(0,S.totalXP-q.xp);
    S.level=Math.max(1,S.level-1);
    showNotif('Quest Abandoned',`-${q.xp} XP — ${q.name}`);
  } else {
    done[qid]=true;
    S.totalXP+=q.xp;
    S.level+=1;
    const rankAfter=getRank(S.totalXP);
    if(rankAfter>rankBefore){
      showLvlUp(RANKS[rankAfter],RCOLS[rankAfter]);
    } else {
      showNotif('Quest Complete',`+${q.xp} XP — ${q.name}`);
    }
    const dayDone=getDayDone(year,month,d);
    if(QUESTS.every(q=>dayDone[q.id])){
      setTimeout(()=>showNotif('◆ Daily Clear!','All quests completed. Bonus awarded.'),600);
      S.totalXP+=20;S.level+=1;
    }
  }
  save();
  renderPlayer();
  renderRankTrack();
  renderCalendar();
  showModal(d);
}

function showLvlUp(rank,col){
  const el=document.getElementById('lvlup');
  document.getElementById('lvlupText').textContent=`RANK ${rank} UNLOCKED`;
  document.getElementById('lvlupText').style.color=col;
  document.getElementById('lvlupSub').textContent=`You have ascended to rank ${rank}. The System acknowledges your growth.`;
  el.classList.add('show');
  closeModal();
}
function dismissLvl(){document.getElementById('lvlup').classList.remove('show');}

document.getElementById('prevBtn').onclick=()=>{if(S.month===0){S.month=11;S.year--;}else S.month--;S.selDay=1;closeModal();renderCalendar();};
document.getElementById('nextBtn').onclick=()=>{if(S.month===11){S.month=0;S.year++;}else S.month++;S.selDay=1;closeModal();renderCalendar();};

renderPlayer();renderRankTrack();renderCalendar();
</script>
