
<style>

<h2 class="sr-only">Solo Leveling gamified task calendar — track daily quests and level up</h2>

<div id="app">
  <div class="system-header">
    <div class="system-title">◆ System Interface — Daily Quest Terminal</div>
    <div style="font-size:11px;color:var(--sl-text-dim);letter-spacing:1px;">NOTION SYNC: ACTIVE</div>
  </div>

  <div class="player-panel" id="playerPanel"></div>

  <div class="rank-track" id="rankTrack"></div>

  <div class="calendar-header">
    <button class="nav-btn" id="prevBtn">&#8249; PREV</button>
    <div class="month-title" id="monthTitle"></div>
    <button class="nav-btn" id="nextBtn">NEXT &#8250;</button>
  </div>

  <div class="calendar-grid" id="calendarGrid"></div>

  <div class="quest-panel" id="questPanel"></div>
</div>

<div class="notification" id="notification">
  <div class="notif-title" id="notifTitle"></div>
  <div class="notif-body" id="notifBody"></div>
</div>

<div class="level-up-overlay" id="levelUpOverlay">
  <div class="level-up-box">
    <div class="level-up-alert">◆ System Alert ◆</div>
    <div class="level-up-text" id="levelUpText"></div>
    <div class="level-up-sub" id="levelUpSub"></div>
    <button class="dismiss-btn" onclick="dismissLevelUp()">Acknowledge</button>
  </div>
</div>

<script>
const RANKS = ['E','D','C','B','A','S','SS','SSS','National'];
const RANK_COLORS = ['#888','#27ae60','#3a7bd5','#a07de8','#d4a843','#c0392b','#e74c3c','#9b59b6','#f39c12'];
const RANK_THRESHOLDS = [0,200,500,1000,2000,3500,5500,8000,12000];

const QUESTS = [
  {id:'morning',name:'Morning Ritual',sub:'Wake up + hydrate + stretch',xp:25,icon:'ti-sun'},
  {id:'workout',name:'Physical Training',sub:'30 min exercise / dungeon run',xp:50,icon:'ti-run'},
  {id:'focus',name:'Deep Focus Session',sub:'90 min uninterrupted work',xp:60,icon:'ti-brain'},
  {id:'read',name:'Knowledge Absorption',sub:'Read 20+ pages',xp:30,icon:'ti-book'},
  {id:'reflect',name:'Hunter\'s Journal',sub:'Log progress & reflections',xp:20,icon:'ti-writing'},
  {id:'mission',name:'Main Mission',sub:'Complete top priority task',xp:70,icon:'ti-sword'},
  {id:'rest',name:'Recovery Protocol',sub:'7–8 hrs sleep',xp:25,icon:'ti-moon'},
];

const TOTAL_DAY_XP = QUESTS.reduce((s,q)=>s+q.xp,0);

let state = {
  month: new Date().getMonth(),
  year: new Date().getFullYear(),
  selectedDay: new Date().getDate(),
  totalXP: 420,
  level: 7,
  completions: {},
};

try {
  const saved = localStorage.getItem('sl_state');
  if (saved) Object.assign(state, JSON.parse(saved));
} catch(e){}

function save() {
  try { localStorage.setItem('sl_state', JSON.stringify(state)); } catch(e){}
}

function getRank(xp) {
  let r = 0;
  for (let i=RANK_THRESHOLDS.length-1;i>=0;i--) {
    if (xp >= RANK_THRESHOLDS[i]) { r=i; break; }
  }
  return r;
}

function getXPToNext(xp) {
  const ri = getRank(xp);
  if (ri >= RANK_THRESHOLDS.length-1) return {pct:100,curr:xp,next:xp};
  const lo = RANK_THRESHOLDS[ri], hi = RANK_THRESHOLDS[ri+1];
  return { pct: Math.round((xp-lo)/(hi-lo)*100), curr: xp-lo, next: hi-lo };
}

function dayKey(y,m,d) { return `${y}-${m}-${d}`; }

function getDayDone(y,m,d) {
  return state.completions[dayKey(y,m,d)] || {};
}

function getDayXPPct(y,m,d) {
  const done = getDayDone(y,m,d);
  const earned = QUESTS.filter(q=>done[q.id]).reduce((s,q)=>s+q.xp,0);
  return earned / TOTAL_DAY_XP;
}

function renderPlayer() {
  const ri = getRank(state.totalXP);
  const info = getXPToNext(state.totalXP);
  const panel = document.getElementById('playerPanel');
  panel.innerHTML = `
    <div class="rank-badge">
      <div class="rank-letter" style="color:${RANK_COLORS[ri]}">${RANKS[ri]}</div>
      <div class="rank-label">Rank</div>
    </div>
    <div class="player-info">
      <div class="player-name">SUNG JIN-WOO</div>
      <div class="player-class">Shadow Monarch Hunter</div>
      <div class="xp-row">
        <div class="xp-bar-bg">
          <div class="xp-bar-fill" style="width:${info.pct}%;background:linear-gradient(90deg,${RANK_COLORS[ri]}88,${RANK_COLORS[ri]})"></div>
        </div>
        <div class="xp-text">${info.curr} / ${info.next} XP</div>
      </div>
      <div class="stats-row">
        <div class="stat-item">Level <span>${state.level}</span></div>
        <div class="stat-item">Total XP <span>${state.totalXP}</span></div>
        <div class="stat-item">Rank <span style="color:${RANK_COLORS[ri]}">${RANKS[ri]}</span></div>
      </div>
    </div>`;
}

function renderRankTrack() {
  const ri = getRank(state.totalXP);
  const track = document.getElementById('rankTrack');
  let html = '<div class="rank-bar">';
  for (let i=0;i<RANK_THRESHOLDS.length;i++) {
    const active = i <= ri;
    const color = active ? RANK_COLORS[i] : '#2a2a3a';
    html += `<div style="flex:1;text-align:center">
      <div class="rank-step"><div class="rank-step-fill" style="width:${active?100:0}%;background:${color}"></div></div>
      <div class="rank-step-label" style="color:${active?color:'var(--sl-text-dim)'}">${RANKS[i]}</div>
    </div>`;
  }
  html += '</div>';
  track.innerHTML = html;
}

function renderCalendar() {
  const {month,year,selectedDay} = state;
  const today = new Date();
  const firstDay = new Date(year,month,1).getDay();
  const daysInMonth = new Date(year,month+1,0).getDate();
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  document.getElementById('monthTitle').textContent = `${months[month]} ${year}`;

  const grid = document.getElementById('calendarGrid');
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let html = days.map(d=>`<div class="day-label">${d}</div>`).join('');

  for (let i=0;i<firstDay;i++) html += `<div class="day-cell empty"></div>`;

  for (let d=1;d<=daysInMonth;d++) {
    const isToday = d===today.getDate() && month===today.getMonth() && year===today.getFullYear();
    const isSel = d===selectedDay && month===state.month && year===state.year;
    const pct = getDayXPPct(year,month,d);
    const fillColor = pct>=1 ? 'var(--sl-gold)' : pct>0 ? 'var(--sl-purple-light)' : 'var(--sl-border)';
    let cls = 'day-cell';
    if (isToday) cls += ' today';
    if (isSel) cls += ' selected';

    html += `<div class="${cls}" onclick="selectDay(${d})">
      <div class="day-num">${d}</div>
      <div class="day-xp-bar"><div class="day-xp-fill" style="width:${Math.round(pct*100)}%;background:${fillColor}"></div></div>
      ${pct>=1?'<div class="day-complete-mark" style="display:block;background:var(--sl-gold)"></div>':''}
    </div>`;
  }
  grid.innerHTML = html;
}

function renderQuests() {
  const {selectedDay,month,year} = state;
  const done = getDayDone(year,month,selectedDay);
  const earned = QUESTS.filter(q=>done[q.id]).reduce((s,q)=>s+q.xp,0);
  const total = TOTAL_DAY_XP;
  const pct = Math.round(earned/total*100);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  let questHtml = QUESTS.map(q=>{
    const isDone = !!done[q.id];
    return `<div class="quest-item ${isDone?'done':''}" onclick="toggleQuest('${q.id}')">
      <div class="quest-check">${isDone?'✓':''}</div>
      <div class="quest-info">
        <div class="quest-name">${q.name}</div>
        <div class="quest-sub">${q.sub}</div>
      </div>
      <div class="quest-xp">+${q.xp} XP</div>
    </div>`;
  }).join('');

  document.getElementById('questPanel').innerHTML = `
    <div class="quest-header">
      <div class="quest-title-block">
        <i class="ti ti-list-check quest-icon" aria-hidden="true"></i>
        <div class="quest-title">Daily Quests</div>
      </div>
      <div class="quest-date">${months[month]} ${selectedDay}, ${year}</div>
    </div>
    <div class="quest-list">${questHtml}</div>
    <div class="daily-progress">
      <div class="progress-label">Daily XP</div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      <div class="progress-count">${earned}/${total}</div>
    </div>`;
}

function selectDay(d) {
  state.selectedDay = d;
  renderCalendar();
  renderQuests();
}

function toggleQuest(qid) {
  const {selectedDay,month,year} = state;
  const key = dayKey(year,month,selectedDay);
  if (!state.completions[key]) state.completions[key] = {};
  const done = state.completions[key];
  const q = QUESTS.find(q=>q.id===qid);
  const wasLevelBefore = state.level;
  const rankBefore = getRank(state.totalXP);

  if (done[qid]) {
    done[qid] = false;
    state.totalXP = Math.max(0, state.totalXP - q.xp);
    state.level = Math.max(1, state.level - 1);
    showNotif('Quest Abandoned', `-${q.xp} XP — ${q.name}`);
  } else {
    done[qid] = true;
    state.totalXP += q.xp;
    state.level += 1;
    const rankAfter = getRank(state.totalXP);
    if (rankAfter > rankBefore) {
      showLevelUp(RANKS[rankAfter], RANK_COLORS[rankAfter]);
    } else {
      showNotif('Quest Complete!', `+${q.xp} XP — ${q.name}`);
    }
  }

  const dayDone = getDayDone(year,month,selectedDay);
  const allDone = QUESTS.every(q=>dayDone[q.id]);
  if (allDone) {
    setTimeout(()=>showNotif('◆ Daily Clear!', 'All quests completed. Bonus XP awarded.'), 600);
    state.totalXP += 20;
    state.level += 1;
  }

  save();
  renderPlayer();
  renderRankTrack();
  renderCalendar();
  renderQuests();
}

let notifTimer;
function showNotif(title, body) {
  const el = document.getElementById('notification');
  document.getElementById('notifTitle').textContent = title;
  document.getElementById('notifBody').textContent = body;
  el.classList.add('show');
  clearTimeout(notifTimer);
  notifTimer = setTimeout(()=>el.classList.remove('show'), 2800);
}

function showLevelUp(rank, color) {
  const overlay = document.getElementById('levelUpOverlay');
  document.getElementById('levelUpText').textContent = `RANK ${rank} UNLOCKED`;
  document.getElementById('levelUpText').style.color = color;
  document.getElementById('levelUpSub').textContent = `You have ascended to rank ${rank}. The System acknowledges your growth.`;
  overlay.classList.add('show');
}

function dismissLevelUp() {
  document.getElementById('levelUpOverlay').classList.remove('show');
}

document.getElementById('prevBtn').onclick = () => {
  if (state.month === 0) { state.month = 11; state.year--; }
  else state.month--;
  state.selectedDay = 1;
  renderCalendar(); renderQuests();
};

document.getElementById('nextBtn').onclick = () => {
  if (state.month === 11) { state.month = 0; state.year++; }
  else state.month++;
  state.selectedDay = 1;
  renderCalendar(); renderQuests();
};

renderPlayer();
renderRankTrack();
renderCalendar();
renderQuests();
</script>
